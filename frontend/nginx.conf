server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Cache hashed build assets aggressively; never cache the entry HTML.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # SPA fallback: every unknown path resolves to the app entry.
  # Note: traefik routes /api to the backend before requests reach nginx in production.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
